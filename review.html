<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>endmysub – Reset Password</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg0:#070b13; --bg1:#0c1629; --bg2:#0a1324;
      --text:rgba(246,248,250,.96);
      --muted:rgba(246,248,250,.72);
      --line:rgba(225,229,234,.18);
      --shadow:0 18px 44px rgba(0,0,0,.42);
      --page:
        radial-gradient(1200px 720px at 15% 8%, rgba(31,58,95,.46), transparent 62%),
        radial-gradient(900px 620px at 85% 10%, rgba(94,122,138,.22), transparent 60%),
        radial-gradient(900px 640px at 45% 115%, rgba(76,175,138,.12), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    body{
      font-family:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
      background:var(--page);
      color:var(--text);
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px;
    }
    .card{
      width:min(560px, 96vw);
      background:linear-gradient(180deg, rgba(246,248,250,.06), rgba(246,248,250,.04));
      border:1px solid rgba(225,229,234,.18);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:18px;
    }
    h1{font-size:22px;letter-spacing:-.2px}
    .sub{margin-top:8px;color:var(--muted);font-size:13px;line-height:1.45}
    label{display:block;font-size:12px;color:rgba(246,248,250,.72);margin:14px 0 6px;font-weight:900}
    input{
      width:100%;
      padding:12px 12px;
      border:1px solid rgba(225,229,234,.20);
      border-radius:12px;
      font-family:inherit;
      font-size:14px;
      outline:none;
      background:rgba(7,11,19,.58);
      color:rgba(246,248,250,.96);
    }
    input:focus{
      border-color:rgba(94,122,138,.70);
      box-shadow:0 0 0 3px rgba(94,122,138,.18)
    }
    .btn{
      margin-top:14px;
      width:100%;
      border:1px solid rgba(76,175,138,.55);
      border-radius:12px;
      padding:12px 14px;
      font-weight:900;
      cursor:pointer;
      font-family:inherit;
      background:linear-gradient(180deg, rgba(76,175,138,.30), rgba(76,175,138,.18));
      color:rgba(246,248,250,.96);
      transition:.15s ease;
    }
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn[disabled]{opacity:.6;cursor:not-allowed;transform:none}
    .msg{
      margin-top:12px;
      font-size:13px;
      line-height:1.35;
      color:rgba(246,248,250,.88);
    }
    .warn{
      margin-top:12px;
      background:rgba(255, 237, 213, .10);
      border:1px solid rgba(254, 215, 170, .40);
      color:#ffd3b0;
      padding:10px 12px;
      border-radius:12px;
      font-size:13px;
      line-height:1.35
    }
    a{color:rgba(246,248,250,.9)}
  </style>
</head>

<body>
  <div class="card">
    <h1>Set a new password</h1>
    <p class="sub">
      This page is opened from the password reset email. Set a new password below.
    </p>

    <div id="status" class="msg">Ready.</div>

    <label>New password</label>
    <input id="p1" type="password" placeholder="••••••••">

    <label>Confirm new password</label>
    <input id="p2" type="password" placeholder="••••••••">

    <button id="btnSet" class="btn" type="button">Update password</button>

    <div class="warn">
      If this page says you are not authenticated, your Supabase Redirect URL / Site URL is wrong.
      Fix it in Supabase: Authentication → URL Configuration.
    </div>

    <p class="sub" style="margin-top:12px">
      Back to <a href="review.html">Reviews</a>
    </p>
  </div>

  <script>
    // ====== SUPABASE CONFIG (SET) ======
    const SUPABASE_URL = "https://babacmszcumkgzyzidnh.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhYmFjbXN6Y3Vta2d6eXppZG5oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg4MDU4NTAsImV4cCI6MjA4NDM4MTg1MH0.rRhi17MQIlE-5iJQDSYu9CENxvaHhbFyHhSct_x-QaY";
    // ===================================

    const status = document.getElementById("status");
    const btnSet = document.getElementById("btnSet");

    function setMsg(t){ status.textContent = t; }

    if (!window.supabase){
      setMsg("Supabase library not loaded (CDN blocked).");
      throw new Error("Supabase library not loaded.");
    }

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    btnSet.addEventListener("click", async () => {
      const p1 = document.getElementById("p1").value;
      const p2 = document.getElementById("p2").value;

      if (!p1 || p1.length < 8){
        setMsg("Password must be at least 8 characters.");
        return;
      }
      if (p1 !== p2){
        setMsg("Passwords do not match.");
        return;
      }

      btnSet.disabled = true;
      setMsg("Updating password...");

      try{
        const { data: sessionData, error: sessionErr } = await sb.auth.getSession();
        if (sessionErr){
          setMsg(sessionErr.message);
          return;
        }

        const user = sessionData?.session?.user;
        if (!user){
          setMsg("Not authenticated. Open this page only from the reset email link.");
          return;
        }

        const { error } = await sb.auth.updateUser({ password: p1 });
        if (error){
          setMsg(error.message);
        } else {
          setMsg("Password updated. Go back to review.html and log in.");
        }
      } finally {
        btnSet.disabled = false;
      }
    });

    setMsg("Ready.");
  </script>
</body>
</html>
